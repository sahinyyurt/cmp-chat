# Exemplar Maestro flow (P1) — chat "send a message" user story.
# appId is org.jetbrains.Chat (capital C — the applicationId, NOT the namespace). See R2.
# Selectors use `id:` = Compose testTag, exposed as resource-id via the root
# `testTagsAsResourceId = true` wrapper in MainActivity. See R1.
appId: org.jetbrains.Chat
---
- launchApp:
    clearState: true

# The message input is present on the chat screen at launch.
- assertVisible:
    id: "chat_message_input"

# Type a unique message. Unique so it never collides with the app's simulated
# friend messages (ChatApp emits a random one every 5s).
- tapOn:
    id: "chat_message_input"
- inputText: "Maestro exemplar ping"

# The send button only renders once the input is non-empty, so assert then tap.
- assertVisible:
    id: "chat_send_button"
- tapOn:
    id: "chat_send_button"

# The sent message appears in the list. Chat messages are identified by text (D1).
- assertVisible: "Maestro exemplar ping"
